<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 84" fill="none">

  <!-- 8 sunflower petals around center (40,48) -->
  <path d="M40,48 C31,49 35,28 40,27 C45,28 49,49 40,48" fill="#F5C200" stroke="#1A2D28" stroke-width="1.1" transform="rotate(0,40,48)"/>
  <path d="M40,48 C31,49 35,28 40,27 C45,28 49,49 40,48" fill="#F5C200" stroke="#1A2D28" stroke-width="1.1" transform="rotate(45,40,48)"/>
  <path d="M40,48 C31,49 35,28 40,27 C45,28 49,49 40,48" fill="#F5C200" stroke="#1A2D28" stroke-width="1.1" transform="rotate(90,40,48)"/>
  <path d="M40,48 C31,49 35,28 40,27 C45,28 49,49 40,48" fill="#F5C200" stroke="#1A2D28" stroke-width="1.1" transform="rotate(135,40,48)"/>
  <path d="M40,48 C31,49 35,28 40,27 C45,28 49,49 40,48" fill="#F5C200" stroke="#1A2D28" stroke-width="1.1" transform="rotate(180,40,48)"/>
  <path d="M40,48 C31,49 35,28 40,27 C45,28 49,49 40,48" fill="#F5C200" stroke="#1A2D28" stroke-width="1.1" transform="rotate(225,40,48)"/>
  <path d="M40,48 C31,49 35,28 40,27 C45,28 49,49 40,48" fill="#F5C200" stroke="#1A2D28" stroke-width="1.1" transform="rotate(270,40,48)"/>
  <path d="M40,48 C31,49 35,28 40,27 C45,28 49,49 40,48" fill="#F5C200" stroke="#1A2D28" stroke-width="1.1" transform="rotate(315,40,48)"/>

  <!-- Left ear -->
  <circle cx="29" cy="36" r="6.5" fill="#9B6845" stroke="#1A2D28" stroke-width="1.1"/>
  <circle cx="29" cy="36.5" r="3.8" fill="#C49570"/>
  <!-- Right ear -->
  <circle cx="51" cy="36" r="6.5" fill="#9B6845" stroke="#1A2D28" stroke-width="1.1"/>
  <circle cx="51" cy="36.5" r="3.8" fill="#C49570"/>

  <!-- Bear face -->
  <ellipse cx="40" cy="48" rx="16" ry="15" fill="#9B6845" stroke="#1A2D28" stroke-width="1.3"/>
  <!-- Muzzle (portrait ellipse, matching logo proportions) -->
  <ellipse cx="40" cy="53" rx="7" ry="8" fill="#D4AA7C"/>
  <!-- Left eye -->
  <circle cx="33" cy="44" r="2.2" fill="#1A2D28"/>
  <circle cx="33.8" cy="43.2" r="0.85" fill="white"/>
  <!-- Right eye -->
  <circle cx="47" cy="44" r="2.2" fill="#1A2D28"/>
  <circle cx="47.8" cy="43.2" r="0.85" fill="white"/>
  <!-- Nose -->
  <ellipse cx="40" cy="50" rx="1.8" ry="1.4" fill="#1A2D28"/>

  <!-- GRADUATION CAP -->
  <!-- Crown box -->
  <rect x="30" y="15" width="20" height="10" rx="2.5" fill="#2A6B58" stroke="#1A2D28" stroke-width="1.1"/>
  <!-- Mortarboard brim (diamond) -->
  <polygon points="40,24 58,33 40,39 22,33" fill="#2A6B58" stroke="#1A2D28" stroke-width="1.1" stroke-linejoin="round"/>
  <!-- Yellow button on crown -->
  <circle cx="40" cy="20" r="1.8" fill="#F5C200"/>
  <!-- Tassel cord -->
  <path d="M57,33 Q63,35 61,44" stroke="#F5C200" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Tassel ball -->
  <circle cx="61" cy="45" r="2.5" fill="#F5C200" stroke="#1A2D28" stroke-width="0.9"/>

</svg>
