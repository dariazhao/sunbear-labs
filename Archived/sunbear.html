<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunbear – Spring Growth</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #FFFCF6;
      background-image:
        radial-gradient(ellipse at 18% 22%, #FFF4D9 0%, transparent 48%),
        radial-gradient(ellipse at 82% 78%, #D0ECE5 0%, transparent 48%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #FFF4D9;
      border: 1.5px solid #FFCA00;
      color: #101828;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 6px 18px;
      border-radius: 999px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: #FFCA00;
      border-radius: 50%;
      animation: ping 1.8s cubic-bezier(0,0,0.2,1) infinite;
    }
    @keyframes ping {
      0%   { transform: scale(1); opacity: 1; }
      75%, 100% { transform: scale(1.8); opacity: 0; }
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(40px, 7vw, 60px);
      font-weight: 900;
      color: #101828;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 14px;
      text-align: center;
    }
    h1 .gradient-text {
      background: linear-gradient(135deg, #FFCA00 0%, #FF9500 40%, #FFCA00 80%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 6s ease-in-out infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    .subtitle {
      font-size: 17px;
      font-weight: 400;
      color: #344054;
      line-height: 1.65;
      margin-bottom: 52px;
      text-align: center;
      max-width: 360px;
    }

    /* ── Bear container ── */
    .bear-wrapper {
      position: relative;
      margin-bottom: 44px;
    }
    .bear-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,202,0,0.22) 0%, transparent 70%);
      border-radius: 50%;
      animation: glowPulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1);   }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.18); }
    }
    .bear-svg {
      position: relative; z-index: 1;
      animation: float 5.5s ease-in-out infinite;
      filter: drop-shadow(0 18px 36px rgba(0,0,0,0.11));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px);    }
      50%       { transform: translateY(-13px); }
    }

    /* ── Sparkle animations ── */
    .sp1 { animation: sparkle 2.8s ease-in-out 0.0s infinite; }
    .sp2 { animation: sparkle 2.8s ease-in-out 0.8s infinite; }
    .sp3 { animation: sparkle 2.8s ease-in-out 1.5s infinite; }
    .sp4 { animation: sparkle 2.8s ease-in-out 0.4s infinite; }
    .sp5 { animation: sparkle 2.8s ease-in-out 2.0s infinite; }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg);   }
      50%       { opacity: 1; transform: scale(1)   rotate(18deg); }
    }

    /* ── Tag row ── */
    .tag-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }
    .tag {
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: #101828;
      transition: transform 0.2s ease;
    }
    .tag:hover { transform: translateY(-2px); }
    .tag-y { background: #FFF4D9; border: 1px solid #FFCA00; }
    .tag-t { background: #D0ECE5; border: 1px solid #A0D4C5; }
    .tag-b { background: #DCEBFF; border: 1px solid #A0C5EF; }

    /* ── CTA row ── */
    .cta-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-primary {
      background: #FFCA00;
      color: #101828;
      font-family: inherit; font-weight: 600; font-size: 15px;
      padding: 12px 28px;
      border-radius: 999px;
      border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .btn-primary:hover { opacity: 0.87; transform: translateY(-1px); }
    .btn-secondary {
      background: transparent;
      color: #344054;
      font-family: inherit; font-weight: 500; font-size: 15px;
      padding: 12px 22px;
      border-radius: 999px;
      border: 1.5px solid #D0D5DD;
      cursor: pointer; text-decoration: none;
      transition: border-color 0.2s ease, color 0.2s ease;
    }
    .btn-secondary:hover { border-color: #FFCA00; color: #101828; }
  </style>
</head>
<body>

  <div class="badge">
    <span class="badge-dot"></span>
    Spring 2026 · Growth Edition
  </div>

  <h1>Meet <span class="gradient-text">Sunbear</span></h1>
  <p class="subtitle">Growing, blooming, and reaching for the sun — one sprout at a time.</p>

  <div class="bear-wrapper">
    <div class="bear-glow"></div>

    <!-- ═══════════════════════════════════════════════
         SUNBEAR SVG  –  460 × 520
         Layers (back → front):
           1. Background card
           2. Background dots
           3. Sunflower petals (12 × ellipses rotated around bear-face center)
           4. Stem
           5. Leaves
           6. Bear ears
           7. Bear face
           8. Bear features (snout, eyes, nose, cheeks, mouth)
           9. Sparkles + pollen
          10. Wordmark badge
         ═══════════════════════════════════════════════ -->
    <svg class="bear-svg"
         width="460" height="520"
         viewBox="0 0 460 520"
         xmlns="http://www.w3.org/2000/svg"
         role="img" aria-label="Sunbear – a cute bear face emerging from a sunflower">

      <defs>
        <!-- Card background -->
        <radialGradient id="bgGrad" cx="45%" cy="42%" r="68%">
          <stop offset="0%"   stop-color="#FFFFFF"/>
          <stop offset="100%" stop-color="#FFF8E8"/>
        </radialGradient>

        <!-- Bear face -->
        <radialGradient id="faceGrad" cx="40%" cy="36%" r="65%">
          <stop offset="0%"   stop-color="#D9A870"/>
          <stop offset="60%"  stop-color="#C49060"/>
          <stop offset="100%" stop-color="#A87248"/>
        </radialGradient>

        <!-- Ears -->
        <radialGradient id="earGrad" cx="38%" cy="32%" r="68%">
          <stop offset="0%"   stop-color="#CC9868"/>
          <stop offset="100%" stop-color="#9A6838"/>
        </radialGradient>

        <!-- Snout -->
        <radialGradient id="snoutGrad" cx="50%" cy="30%" r="65%">
          <stop offset="0%"   stop-color="#EDD0A0"/>
          <stop offset="100%" stop-color="#D4A870"/>
        </radialGradient>

        <!-- Sunflower petal — lighter at tip, deeper at base -->
        <linearGradient id="petalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#FFE566"/>
          <stop offset="40%"  stop-color="#FFCA00"/>
          <stop offset="100%" stop-color="#CC9900"/>
        </linearGradient>

        <!-- Leaves -->
        <linearGradient id="leafL" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#90D068"/>
          <stop offset="100%" stop-color="#58A038"/>
        </linearGradient>
        <linearGradient id="leafR" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#90D068"/>
          <stop offset="100%" stop-color="#58A038"/>
        </linearGradient>

        <!-- Petal edge shadow -->
        <filter id="petalShadow" x="-15%" y="-15%" width="130%" height="130%">
          <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#00000014"/>
        </filter>
      </defs>

      <!-- ── 1. Card background ── -->
      <rect x="10" y="10" width="440" height="500" rx="56" fill="url(#bgGrad)"/>
      <!-- Subtle yellow border ring -->
      <rect x="10" y="10" width="440" height="500" rx="56"
            fill="none" stroke="#FFCA00" stroke-width="1.5" opacity="0.28"/>

      <!-- ── 2. Background decorative dots ── -->
      <!-- Top-left cluster -->
      <circle cx="46"  cy="50"  r="3.5" fill="#FFCA00" opacity="0.17"/>
      <circle cx="70"  cy="66"  r="2"   fill="#FFCA00" opacity="0.11"/>
      <circle cx="38"  cy="80"  r="2.5" fill="#D0ECE5" opacity="0.55"/>
      <!-- Top-right cluster -->
      <circle cx="414" cy="50"  r="3.5" fill="#FFCA00" opacity="0.17"/>
      <circle cx="390" cy="68"  r="2"   fill="#FFCA00" opacity="0.11"/>
      <circle cx="422" cy="82"  r="2.5" fill="#D0ECE5" opacity="0.55"/>
      <!-- Bottom clusters -->
      <circle cx="52"  cy="458" r="3"   fill="#90D068" opacity="0.22"/>
      <circle cx="408" cy="463" r="3"   fill="#90D068" opacity="0.22"/>
      <circle cx="78"  cy="476" r="2"   fill="#FFCA00" opacity="0.18"/>
      <circle cx="382" cy="474" r="2"   fill="#FFCA00" opacity="0.18"/>

      <!-- ── 3. Sunflower petals ──
           Bear/flower center: (230, 238)
           Petal orbit radius: 122  Petal: rx=23 ry=54
           12 petals at 30° intervals
           rotate(N, 0, 0) inside group translated to face center
           → each petal points radially outward at angle N
      ── -->
      <g filter="url(#petalShadow)">
        <g transform="translate(230, 238)">
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(0,   0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(30,  0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(60,  0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(90,  0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(120, 0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(150, 0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(180, 0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(210, 0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(240, 0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(270, 0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(300, 0,0)"/>
          <ellipse cx="0" cy="-122" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(330, 0,0)"/>
        </g>
      </g>

      <!-- ── 4. Stem ── -->
      <!-- Main stem -->
      <path d="M 230 472 Q 232 440 230 378"
            stroke="#5AAA3A" stroke-width="11" stroke-linecap="round" fill="none"/>
      <!-- Highlight stripe -->
      <path d="M 227 472 Q 229 440 227 378"
            stroke="#88CC60" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.5"/>

      <!-- ── 5. Leaves ── -->
      <!-- Left leaf (at stem y≈435) -->
      <g transform="translate(229, 435) rotate(-50)">
        <ellipse cx="24" cy="0" rx="42" ry="17" fill="url(#leafL)"/>
        <!-- Main vein -->
        <line x1="0" y1="0" x2="46" y2="0" stroke="#3A8828" stroke-width="1.5" opacity="0.38" stroke-linecap="round"/>
        <!-- Side vein -->
        <path d="M 12,-3 Q 28,-11 40,-2" stroke="#3A8828" stroke-width="1" opacity="0.22" fill="none"/>
      </g>
      <!-- Right leaf (at stem y≈410) -->
      <g transform="translate(231, 410) rotate(46)">
        <ellipse cx="24" cy="0" rx="42" ry="17" fill="url(#leafR)"/>
        <line x1="0" y1="0" x2="46" y2="0" stroke="#3A8828" stroke-width="1.5" opacity="0.38" stroke-linecap="round"/>
        <path d="M 12,-3 Q 28,-11 40,-2" stroke="#3A8828" stroke-width="1" opacity="0.22" fill="none"/>
      </g>

      <!-- ── 6. Ears (behind face, in front of petals) ── -->
      <!-- Left ear -->
      <circle cx="166" cy="150" r="38" fill="url(#earGrad)"/>
      <circle cx="166" cy="150" r="25" fill="#E09878" opacity="0.68"/>
      <!-- Right ear -->
      <circle cx="294" cy="150" r="38" fill="url(#earGrad)"/>
      <circle cx="294" cy="150" r="25" fill="#E09878" opacity="0.68"/>

      <!-- ── 7. Bear face ── -->
      <circle cx="230" cy="238" r="112" fill="url(#faceGrad)"/>
      <!-- Subtle top-left highlight -->
      <ellipse cx="196" cy="194" rx="50" ry="30" fill="white" opacity="0.07"
               transform="rotate(-18, 196, 194)"/>
      <!-- Thin seed-ring between petals and face (sunflower texture hint) -->
      <circle cx="230" cy="238" r="114" fill="none" stroke="#7A4820" stroke-width="3" opacity="0.12"/>

      <!-- ── 8. Bear features ── -->

      <!-- Snout -->
      <ellipse cx="230" cy="277" rx="53" ry="40" fill="url(#snoutGrad)"/>

      <!-- Nose -->
      <ellipse cx="230" cy="255" rx="13" ry="10" fill="#2E1A0A"/>
      <ellipse cx="226" cy="252" rx="4.5" ry="3" fill="white" opacity="0.28"/>

      <!-- Left eye -->
      <circle cx="194" cy="221" r="14" fill="#2E1A0A"/>
      <!-- Eye-shine: big + small dot -->
      <circle cx="199" cy="216" r="5.5" fill="white"/>
      <circle cx="204" cy="223" r="2.5" fill="white" opacity="0.52"/>

      <!-- Right eye -->
      <circle cx="266" cy="221" r="14" fill="#2E1A0A"/>
      <circle cx="271" cy="216" r="5.5" fill="white"/>
      <circle cx="276" cy="223" r="2.5" fill="white" opacity="0.52"/>

      <!-- Cheek blush — left -->
      <ellipse cx="172" cy="258" rx="32" ry="21" fill="#F09080" opacity="0.40"/>
      <!-- Cheek blush — right -->
      <ellipse cx="288" cy="258" rx="32" ry="21" fill="#F09080" opacity="0.40"/>

      <!-- Smile — happy, content curve -->
      <path d="M 208 274 Q 230 302 252 274"
            stroke="#2E1A0A" stroke-width="3.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- ── 9. Sparkles + pollen ── -->

      <!-- Four-pointed star sparkles (animated via CSS) -->
      <g transform="translate(78, 98)" class="sp1">
        <path d="M0,-12 L2.5,-2.5 L12,0 L2.5,2.5 L0,12 L-2.5,2.5 L-12,0 L-2.5,-2.5Z" fill="#FFCA00"/>
      </g>
      <g transform="translate(382, 106)" class="sp2">
        <path d="M0,-10 L2,-2 L10,0 L2,2 L0,10 L-2,2 L-10,0 L-2,-2Z" fill="#FFCA00"/>
      </g>
      <g transform="translate(102, 74)" class="sp3">
        <path d="M0,-7 L1.4,-1.4 L7,0 L1.4,1.4 L0,7 L-1.4,1.4 L-7,0 L-1.4,-1.4Z" fill="#90D068"/>
      </g>
      <g transform="translate(358, 78)" class="sp4">
        <path d="M0,-7 L1.4,-1.4 L7,0 L1.4,1.4 L0,7 L-1.4,1.4 L-7,0 L-1.4,-1.4Z" fill="#90D068"/>
      </g>
      <g transform="translate(54, 248)" class="sp5">
        <path d="M0,-6 L1.2,-1.2 L6,0 L1.2,1.2 L0,6 L-1.2,1.2 L-6,0 L-1.2,-1.2Z" fill="#FFCA00" opacity="0.8"/>
      </g>

      <!-- Pollen dots (static, semi-transparent) -->
      <circle cx="135" cy="136" r="5"   fill="#FFCA00" opacity="0.50"/>
      <circle cx="325" cy="136" r="5"   fill="#FFCA00" opacity="0.50"/>
      <circle cx="97"  cy="250" r="4"   fill="#FFCA00" opacity="0.40"/>
      <circle cx="363" cy="250" r="4"   fill="#FFCA00" opacity="0.40"/>
      <circle cx="122" cy="338" r="3.5" fill="#FFCA00" opacity="0.30"/>
      <circle cx="338" cy="338" r="3.5" fill="#FFCA00" opacity="0.30"/>
      <!-- Tiny leaf-green dots near sparkles -->
      <circle cx="128" cy="108" r="3"   fill="#90D068" opacity="0.45"/>
      <circle cx="332" cy="112" r="3"   fill="#90D068" opacity="0.45"/>

      <!-- ── 10. Wordmark badge at base of card ── -->
      <rect x="178" y="464" width="104" height="26" rx="13" fill="#FFCA00" opacity="0.92"/>
      <text x="230" y="482"
            text-anchor="middle"
            font-family="Inter, -apple-system, sans-serif"
            font-weight="800"
            font-size="11"
            letter-spacing="0.12em"
            fill="#101828">SUNBEAR</text>

    </svg>
  </div><!-- /.bear-wrapper -->

  <div class="tag-row">
    <span class="tag tag-y">🌻 Growth</span>
    <span class="tag tag-t">🌱 Sprouting</span>
    <span class="tag tag-b">☀️ Springtime</span>
  </div>

  <div class="cta-row">
    <a href="#" class="btn-primary">Start growing →</a>
    <a href="#" class="btn-secondary">Learn more</a>
  </div>

</body>
</html>
